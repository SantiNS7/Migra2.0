<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Diario de Migrañas · Dr. Soriano</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Nunito:wght@200;300;400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F0F4F8;
    --surface: #FFFFFF;
    --surface2: #EBF0F5;
    --border: #D8E2EC;
    --text: #0F1F2E;
    --muted: #6B859E;
    --accent: #1A5F9C;
    --accent-l: #E6EFF8;
    --accent-d: #0D3D6B;
    --ok: #1A7A4A;
    --ok-l: #E6F4ED;
    --warn: #B05E00;
    --warn-l: #FDF0E0;
    --danger: #B03030;
    --danger-l: #FAEAEA;
    --radius: 14px;
    --shadow: 0 1px 4px rgba(15,31,46,0.07), 0 4px 16px rgba(15,31,46,0.04);
  }
  html, body { height: 100%; background: var(--bg); }
  body { font-family: 'Nunito', sans-serif; color: var(--text); -webkit-tap-highlight-color: transparent; }
  .app { max-width: 460px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }

  /* HEADER */
  .header { padding: 44px 20px 16px; }
  .header-brand { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
  .brand-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; }
  .brand-name { font-size: 11px; font-weight: 500; letter-spacing: 1.2px; text-transform: uppercase; color: var(--accent); }
  .header h1 { font-family: 'Cormorant Garamond', serif; font-size: 34px; line-height: 1.1; font-weight: 300; letter-spacing: 0.5px; }
  .header h1 em { font-style: italic; color: var(--accent); }
  .header-sub { font-size: 13px; color: var(--muted); margin-top: 5px; font-weight: 300; }
  .stats-row { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 5px 13px; font-size: 12px; color: var(--muted); box-shadow: var(--shadow); }
  .stat strong { color: var(--text); font-weight: 500; }

  /* NAV */
  .tabs { display: flex; background: var(--surface); border-top: 1px solid var(--border); padding: 6px 6px 14px; position: sticky; bottom: 0; z-index: 50; box-shadow: 0 -4px 20px rgba(15,31,46,0.06); }
  .tab { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 8px 4px; border: none; background: none; cursor: pointer; border-radius: 10px; font-size: 10px; font-family: 'Nunito', sans-serif; font-weight: 500; color: var(--muted); letter-spacing: 0.2px; transition: all 0.15s; }
  .tab.active { color: var(--accent); background: var(--accent-l); }
  .tab-icon { font-size: 20px; line-height: 1; }

  /* CONTENT */
  .content { flex: 1; padding: 6px 16px 16px; overflow-y: auto; }
  .hidden { display: none; }

  /* CARD */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; margin-bottom: 12px; box-shadow: var(--shadow); }
  .card-title { font-size: 10px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; }
  .divider { height: 1px; background: var(--border); margin: 14px 0; }

  /* EPISODE LIST */
  .ep-item { display: flex; align-items: center; gap: 13px; padding: 13px 0; border-bottom: 1px solid var(--border); cursor: pointer; transition: opacity 0.15s; }
  .ep-item:last-child { border-bottom: none; padding-bottom: 0; }
  .ep-item:active { opacity: 0.7; }
  .ep-badge { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 500; flex-shrink: 0; font-family: 'Cormorant Garamond', serif; }
  .low  { background: var(--ok-l);   color: var(--ok); }
  .mid  { background: var(--warn-l); color: var(--warn); }
  .high { background: var(--danger-l); color: var(--danger); }
  .ep-info { flex: 1; min-width: 0; }
  .ep-date { font-size: 13px; font-weight: 500; }
  .ep-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .ep-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px; }
  .tag { font-size: 10px; padding: 2px 8px; border-radius: 6px; background: var(--surface2); color: var(--muted); font-weight: 500; }
  .tag.t { background: var(--accent-l); color: var(--accent); }

  /* FORM */
  .field { margin-bottom: 18px; }
  .field:last-child { margin-bottom: 0; }
  label { font-size: 11px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; display: block; margin-bottom: 8px; }
  input[type=text], input[type=date], input[type=time], input[type=number], textarea {
    width: 100%; padding: 13px 14px; border: 1.5px solid var(--border); border-radius: 10px;
    font-size: 15px; font-family: 'Nunito', sans-serif; background: var(--surface);
    color: var(--text); outline: none; -webkit-appearance: none; appearance: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(26,95,156,0.1); }
  textarea { resize: none; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .int-wrap { background: var(--accent-l); border-radius: 12px; padding: 16px; }
  .int-display { font-family: 'Cormorant Garamond', serif; font-size: 56px; color: var(--accent); text-align: center; line-height: 1; font-weight: 300; }
  .int-sub { text-align: center; font-size: 11px; color: var(--muted); margin-top: 4px; margin-bottom: 14px; font-weight: 500; letter-spacing: 0.3px; text-transform: uppercase; }
  input[type=range] { width: 100%; accent-color: var(--accent); cursor: pointer; }
  .range-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-top: 6px; font-weight: 500; }

  .pills { display: flex; flex-wrap: wrap; gap: 7px; }
  .pill { padding: 8px 14px; border-radius: 8px; border: 1.5px solid var(--border); font-size: 13px; background: var(--surface); cursor: pointer; color: var(--text); font-family: 'Nunito', sans-serif; transition: all 0.15s; user-select: none; }
  .pill.on { background: var(--accent-l); border-color: var(--accent); color: var(--accent); font-weight: 500; }

  .stars { display: flex; gap: 8px; justify-content: center; padding: 6px 0; }
  .star { font-size: 30px; cursor: pointer; color: var(--border); transition: color 0.15s; user-select: none; }
  .star.on { color: #E8A020; }

  .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-size: 15px; font-family: 'Nunito', sans-serif; font-weight: 500; cursor: pointer; margin-top: 6px; }
  .btn-primary { background: var(--accent); color: white; box-shadow: 0 4px 16px rgba(26,95,156,0.25); }
  .btn-ghost   { background: none; border: 1.5px solid var(--border); color: var(--muted); font-size: 14px; padding: 12px; font-weight: 400; }
  .btn-export  { background: var(--surface); border: 1.5px solid var(--border); color: var(--text); font-size: 14px; padding: 13px; font-weight: 500; }

  /* CHARTS */
  .bar-chart { display: flex; flex-direction: column; gap: 10px; }
  .bar-row { display: flex; align-items: center; gap: 10px; }
  .bar-label { font-size: 12px; min-width: 120px; }
  .bar-track { flex: 1; height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; background: var(--accent); border-radius: 3px; opacity: 0.7; }
  .bar-count { font-size: 11px; color: var(--muted); width: 24px; text-align: right; }

  /* INSIGHT */
  .insight { display: flex; gap: 12px; padding: 13px; background: var(--accent-l); border-radius: 10px; margin-bottom: 8px; border-left: 3px solid var(--accent); }
  .insight:last-child { margin-bottom: 0; }
  .insight-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
  .insight-text { font-size: 13px; line-height: 1.5; }
  .insight-text strong { color: var(--accent); font-weight: 500; }

  /* MODAL */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(15,31,46,0.5); z-index: 200; align-items: flex-end; backdrop-filter: blur(4px); }
  .overlay.show { display: flex; }
  .modal { background: var(--surface); border-radius: 20px 20px 0 0; padding: 20px; width: 100%; max-height: 85vh; overflow-y: auto; position: relative; animation: up 0.25s ease; }
  @keyframes up { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; }
  .modal-close { position: absolute; top: 18px; right: 18px; width: 30px; height: 30px; border-radius: 50%; background: var(--surface2); border: none; font-size: 15px; cursor: pointer; color: var(--muted); }
  .modal-badge-row { display: flex; align-items: center; gap: 14px; margin-bottom: 18px; }
  .modal-badge-big { width: 52px; height: 52px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 500; flex-shrink: 0; }
  .modal-title { font-family: 'Cormorant Garamond', serif; font-size: 22px; padding-right: 36px; }
  .modal-subtitle { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .modal-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 11px 0; border-bottom: 1px solid var(--border); font-size: 13px; gap: 12px; }
  .modal-row:last-of-type { border-bottom: none; }
  .modal-key { color: var(--muted); flex-shrink: 0; font-size: 12px; font-weight: 500; }
  .modal-val { font-weight: 500; text-align: right; }
  .btn-delete { width: 100%; margin-top: 16px; padding: 12px; border: 1.5px solid #FECACA; background: none; color: var(--danger); border-radius: 10px; font-size: 14px; font-family: 'Nunito', sans-serif; cursor: pointer; }

  /* TOAST */
  .toast { display: none; position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: var(--ok); color: white; padding: 10px 22px; border-radius: 20px; font-size: 13px; font-weight: 500; z-index: 400; white-space: nowrap; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
  .toast.show { display: block; animation: fadeup 0.2s ease; }
  @keyframes fadeup { from { opacity:0; transform: translateX(-50%) translateY(8px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }

  .empty { text-align: center; padding: 52px 24px; color: var(--muted); }
  .empty-icon { font-size: 44px; margin-bottom: 14px; }
  .empty-text { font-size: 14px; line-height: 1.6; }
  .empty-text strong { color: var(--accent); }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="header-brand">
      <div class="brand-dot"></div>
      <div class="brand-name">Dr. Soriano, Aldo Emanuel · Neurología Clínica</div>
    </div>
    <h1 id="page-title"><em>Diario</em> de migraña</h1>
    <div class="header-sub" id="page-sub">Registro personal de episodios</div>
    <div class="stats-row" id="stats-row"></div>
  </div>

  <!-- HISTORIAL -->
  <div class="content" id="page-home">
    <div class="card">
      <div class="card-title">Episodios recientes</div>
      <div id="episode-list"></div>
    </div>
    <button class="btn btn-export" onclick="exportPDF()">📄 Generar informe para el médico</button>
  </div>

  <!-- NUEVO EPISODIO -->
  <div class="content hidden" id="page-new">
    <div class="card">
      <div class="field">
        <label>Fecha y hora de inicio</label>
        <div class="row2">
          <input type="date" id="f-date" />
          <input type="time" id="f-time" value="08:00" />
        </div>
      </div>
      <div class="field" style="margin-bottom:0">
        <label>Duración: <span id="dur-label">4</span> horas</label>
        <input type="number" id="f-dur" min="0.5" max="72" step="0.5" value="4"
          oninput="document.getElementById('dur-label').textContent=this.value" />
      </div>
    </div>

    <div class="card">
      <label>Intensidad del dolor</label>
      <div class="int-wrap">
        <div class="int-display" id="int-display">6</div>
        <div class="int-sub">sobre 10</div>
        <input type="range" id="f-int" min="1" max="10" value="6"
          oninput="document.getElementById('int-display').textContent=this.value" />
        <div class="range-labels"><span>Leve</span><span>Moderado</span><span>Severo</span></div>
      </div>
    </div>

    <div class="card">
      <div class="field">
        <label>Localización del dolor</label>
        <div class="pills" id="location-pills"></div>
        <div class="hidden" id="location-other-field" style="margin-top:10px">
          <input type="text" id="f-location-other" placeholder="Describí la localización..." />
        </div>
      </div>
      <div class="divider"></div>
      <div class="field">
        <label>Desencadenantes</label>
        <div class="pills" id="triggers-pills"></div>
      </div>
      <div class="divider"></div>
      <div class="field" style="margin-bottom:0">
        <label>Síntomas</label>
        <div class="pills" id="symptoms-pills"></div>
      </div>
    </div>

    <div class="card">
      <div class="field">
        <label>Medicamento</label>
        <div class="pills" id="meds-pills"></div>
      </div>
      <div class="field hidden" id="dose-field">
        <label>Dosis</label>
        <input type="text" id="f-dose" placeholder="Ej: 400mg, 1 comprimido..." />
      </div>
      <div class="field hidden" id="effect-field" style="margin-bottom:0">
        <label>Efectividad</label>
        <div class="stars" id="stars"></div>
      </div>
    </div>

    <div class="card">
      <div class="field" style="margin-bottom:0">
        <label>Notas</label>
        <textarea id="f-notes" rows="3" placeholder="Contexto, observaciones..."></textarea>
      </div>
    </div>

    <button class="btn btn-primary" onclick="saveEpisode()">Guardar episodio</button>
    <button class="btn btn-ghost" onclick="goTab('home')">Cancelar</button>
  </div>

  <!-- ESTADÍSTICAS -->
  <div class="content hidden" id="page-stats">
    <div id="stats-content"></div>
  </div>

  <div class="tabs">
    <button class="tab active" id="tab-home" onclick="goTab('home')">
      <span class="tab-icon">📋</span>Historial
    </button>
    <button class="tab" id="tab-new" onclick="goTab('new')">
      <span class="tab-icon" style="font-size:24px">＋</span>Registrar
    </button>
    <button class="tab" id="tab-stats" onclick="goTab('stats')">
      <span class="tab-icon">📈</span>Análisis
    </button>
  </div>
</div>

<div class="overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal-body">
    <div class="modal-handle"></div>
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-badge-row">
      <div class="modal-badge-big" id="m-badge"></div>
      <div>
        <div class="modal-title" id="m-title"></div>
        <div class="modal-subtitle" id="m-subtitle"></div>
      </div>
    </div>
    <div id="m-rows"></div>
    <button class="btn-delete" id="m-delete">Eliminar episodio</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const KEY = "migrana_v3";
const TRIGGERS  = ["Estrés","Falta de sueño","Alcohol","Cafeína","Luz intensa","Ruido","Ayuno","Menstruación","Clima","Pantallas","Perfumes","Ejercicio"];
const SYMPTOMS  = ["Náuseas","Aura visual","Fotosensibilidad","Sonofobia","Vómitos","Mareos","Cuello rígido","Hormigueo"];
const MEDS      = ["Ibuprofeno","Paracetamol","Sumatriptán","Ergotamina","Naproxeno","Otro"];
const LOCATIONS = ["A — Un lado","B — Toda la cabeza","C — Parte de atrás","D — En el ojo","Otra..."];

let episodes = [];
let selTriggers=[], selSymptoms=[], selLocations=[], selMed="", medEffect=3;

function load()   { try { episodes = JSON.parse(localStorage.getItem(KEY)) || []; } catch { episodes=[]; } }
function persist(){ try { localStorage.setItem(KEY, JSON.stringify(episodes)); } catch {} }
load();

function fmtDate(d) {
  return new Date(d+"T12:00:00").toLocaleDateString("es-AR",{weekday:"short",day:"numeric",month:"short"});
}
function intClass(i){ return i<=3?"low":i<=6?"mid":"high"; }
function today(){ return new Date().toISOString().slice(0,10); }
function showToast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg; t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2200);
}

function goTab(tab){
  ["home","new","stats"].forEach(t=>{
    document.getElementById("page-"+t).classList.toggle("hidden",t!==tab);
    document.getElementById("tab-"+t).classList.toggle("active",t===tab);
  });
  const titles={home:["<em>Diario</em> de migraña","Registro personal de episodios"],new:["Nuevo <em>episodio</em>",""],stats:["<em>Análisis</em> y patrones",""]};
  document.getElementById("page-title").innerHTML=titles[tab][0];
  document.getElementById("page-sub").textContent=titles[tab][1];
  document.getElementById("stats-row").style.display=tab==="home"?"":"none";
  if(tab==="home") renderHome();
  if(tab==="stats") renderStats();
  if(tab==="new") resetForm();
}

function renderHome(){
  const thisMonth=episodes.filter(e=>e.date.slice(0,7)===today().slice(0,7)).length;
  const avg=episodes.length?(episodes.reduce((s,e)=>s+e.intensity,0)/episodes.length).toFixed(1):"—";
  document.getElementById("stats-row").innerHTML=
    `<div class="stat">Este mes: <strong>${thisMonth}</strong></div>
     <div class="stat">Intensidad media: <strong>${avg}${avg!=="—"?"/10":""}</strong></div>
     <div class="stat">Total: <strong>${episodes.length}</strong></div>`;
  const list=document.getElementById("episode-list");
  if(!episodes.length){
    list.innerHTML=`<div class="empty"><div class="empty-icon">🗒️</div>
      <div class="empty-text">Aún no hay episodios.<br>Tocá <strong>＋ Registrar</strong> para empezar.</div></div>`;
    return;
  }
  list.innerHTML=episodes.map(ep=>`
    <div class="ep-item" onclick="openModal(${ep.id})">
      <div class="ep-badge ${intClass(ep.intensity)}">${ep.intensity}</div>
      <div class="ep-info">
        <div class="ep-date">${fmtDate(ep.date)}</div>
        <div class="ep-meta">${ep.startTime} · ${ep.duration}h${ep.medication?" · "+ep.medication:""}</div>
        <div class="ep-tags">
          ${ep.triggers.slice(0,3).map(t=>`<span class="tag t">${t}</span>`).join("")}
          ${ep.symptoms.slice(0,2).map(s=>`<span class="tag">${s}</span>`).join("")}
        </div>
      </div>
      <span style="color:var(--border);font-size:18px">›</span>
    </div>`).join("");
}

function resetForm(){
  selTriggers=[];selSymptoms=[];selLocations=[];selMed="";medEffect=3;
  document.getElementById("f-date").value=today();
  document.getElementById("f-time").value="08:00";
  document.getElementById("f-dur").value=4;
  document.getElementById("f-int").value=6;
  document.getElementById("dur-label").textContent=4;
  document.getElementById("int-display").textContent=6;
  document.getElementById("f-notes").value="";
  document.getElementById("f-dose").value="";
  document.getElementById("f-location-other").value="";
  document.getElementById("location-other-field").classList.add("hidden");
  document.getElementById("dose-field").classList.add("hidden");
  document.getElementById("effect-field").classList.add("hidden");
  renderPills("location-pills",LOCATIONS,selLocations,"locations");
  renderPills("triggers-pills",TRIGGERS,selTriggers,"triggers");
  renderPills("symptoms-pills",SYMPTOMS,selSymptoms,"symptoms");
  renderPills("meds-pills",MEDS,[],"meds");
  renderStars();
}

function renderPills(id,items,selected,group){
  document.getElementById(id).innerHTML=items.map(item=>
    `<div class="pill ${selected.includes(item)?"on":""}" onclick="togglePill('${group}','${item}')">${item}</div>`
  ).join("");
}

function togglePill(group,val){
  if(group==="locations"){
    selLocations=selLocations.includes(val)?selLocations.filter(x=>x!==val):[...selLocations,val];
    renderPills("location-pills",LOCATIONS,selLocations,"locations");
    document.getElementById("location-other-field").classList.toggle("hidden",!selLocations.includes("Otra..."));
  } else if(group==="triggers"){
    selTriggers=selTriggers.includes(val)?selTriggers.filter(x=>x!==val):[...selTriggers,val];
    renderPills("triggers-pills",TRIGGERS,selTriggers,"triggers");
  } else if(group==="symptoms"){
    selSymptoms=selSymptoms.includes(val)?selSymptoms.filter(x=>x!==val):[...selSymptoms,val];
    renderPills("symptoms-pills",SYMPTOMS,selSymptoms,"symptoms");
  } else if(group==="meds"){
    selMed=selMed===val?"":val;
    renderPills("meds-pills",MEDS,selMed?[selMed]:[],"meds");
    document.getElementById("effect-field").classList.toggle("hidden",!selMed);
    document.getElementById("dose-field").classList.toggle("hidden",!selMed);
  }
}

function renderStars(){
  document.getElementById("stars").innerHTML=[1,2,3,4,5].map(s=>
    `<span class="star ${s<=medEffect?"on":""}" onclick="setEffect(${s})">★</span>`
  ).join("");
}
function setEffect(n){medEffect=n;renderStars();}

function saveEpisode(){
  const date=document.getElementById("f-date").value;
  if(!date){alert("Seleccioná una fecha");return;}
  const locationOther=document.getElementById("f-location-other").value;
  const locations=selLocations.includes("Otra...")&&locationOther
    ?[...selLocations.filter(x=>x!=="Otra..."),"Otra: "+locationOther]
    :selLocations.filter(x=>x!=="Otra...");
  const ep={
    id:Date.now(),date,
    startTime:document.getElementById("f-time").value,
    duration:+document.getElementById("f-dur").value,
    intensity:+document.getElementById("f-int").value,
    locations,triggers:[...selTriggers],symptoms:[...selSymptoms],
    medication:selMed,dose:document.getElementById("f-dose").value,
    medEffect,notes:document.getElementById("f-notes").value
  };
  episodes.unshift(ep);
  episodes.sort((a,b)=>a.date<b.date?1:-1);
  persist();goTab("home");showToast("✓ Episodio guardado");
}

function openModal(id){
  const ep=episodes.find(e=>e.id===id);if(!ep)return;
  const badge=document.getElementById("m-badge");
  badge.textContent=ep.intensity;badge.className="modal-badge-big "+intClass(ep.intensity);
  document.getElementById("m-title").textContent=fmtDate(ep.date);
  document.getElementById("m-subtitle").textContent=ep.startTime+" · "+ep.duration+" horas";
  const rows=[
    ["Intensidad",ep.intensity+" / 10"],
    ep.locations&&ep.locations.length?["Localización",ep.locations.join(", ")]:null,
    ep.triggers.length?["Desencadenantes",ep.triggers.join(", ")]:null,
    ep.symptoms.length?["Síntomas",ep.symptoms.join(", ")]:null,
    ep.medication?["Medicamento",ep.medication+(ep.dose?" — "+ep.dose:"")]:null,
    ep.medication?["Efectividad","★".repeat(ep.medEffect)+"☆".repeat(5-ep.medEffect)]:null,
    ep.notes?["Notas",ep.notes]:null,
  ].filter(Boolean);
  document.getElementById("m-rows").innerHTML=rows.map(([k,v])=>
    `<div class="modal-row"><span class="modal-key">${k}</span><span class="modal-val">${v}</span></div>`
  ).join("");
  document.getElementById("m-delete").onclick=()=>deleteEpisode(id);
  document.getElementById("modal-overlay").classList.add("show");
}
function closeModal(e){
  if(!e||e.target===document.getElementById("modal-overlay"))
    document.getElementById("modal-overlay").classList.remove("show");
}
function deleteEpisode(id){
  episodes=episodes.filter(e=>e.id!==id);
  persist();closeModal();renderHome();showToast("Episodio eliminado");
}

function renderStats(){
  const container=document.getElementById("stats-content");
  if(episodes.length<2){
    container.innerHTML=`<div class="empty"><div class="empty-icon">📊</div>
      <div class="empty-text">Registrá al menos 2 episodios<br>para ver estadísticas.</div></div>`;
    return;
  }
  const triggerCount={};
  episodes.forEach(e=>e.triggers.forEach(t=>triggerCount[t]=(triggerCount[t]||0)+1));
  const topTriggers=Object.entries(triggerCount).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const maxTrig=topTriggers[0]?.[1]||1;
  const avg=(episodes.reduce((s,e)=>s+e.intensity,0)/episodes.length).toFixed(1);
  const thisMonth=episodes.filter(e=>e.date.slice(0,7)===today().slice(0,7)).length;
  const recent=[...episodes].reverse().slice(-10);
  const W=400,H=120,P={t:10,r:10,b:20,l:28};
  const iW=W-P.l-P.r,iH=H-P.t-P.b;
  const xs=recent.map((_,i)=>P.l+(i/Math.max(recent.length-1,1))*iW);
  const ys=recent.map(e=>P.t+iH-((e.intensity-1)/9)*iH);
  const poly=xs.map((x,i)=>`${x},${ys[i]}`).join(" ");
  const dots=recent.map((e,i)=>`<circle cx="${xs[i]}" cy="${ys[i]}" r="4" fill="#1A5F9C"/>`).join("");
  const yL=[1,4,7,10].map(v=>{const y=P.t+iH-((v-1)/9)*iH;return`<text x="${P.l-4}" y="${y+4}" font-size="9" fill="#6B859E" text-anchor="end">${v}</text><line x1="${P.l}" y1="${y}" x2="${W-P.r}" y2="${y}" stroke="#D8E2EC" stroke-width="1"/>`;}).join("");

  container.innerHTML=`
    <div class="card">
      <div class="card-title">Intensidad por episodio</div>
      <div style="overflow-x:auto">
        <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px">
          ${yL}
          <polyline points="${poly}" fill="none" stroke="#1A5F9C" stroke-width="2.5" stroke-linejoin="round"/>
          ${dots}
        </svg>
      </div>
    </div>
    ${topTriggers.length?`
    <div class="card">
      <div class="card-title">Principales desencadenantes</div>
      <div class="bar-chart">
        ${topTriggers.map(([t,c])=>`
          <div class="bar-row">
            <div class="bar-label">${t}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${Math.round((c/maxTrig)*100)}%"></div></div>
            <div class="bar-count">${c}</div>
          </div>`).join("")}
      </div>
    </div>`:""}
    <div class="card">
      <div class="card-title">Observaciones</div>
      ${topTriggers[0]?`<div class="insight"><div class="insight-icon">⚡</div>
        <div class="insight-text">Tu desencadenante más frecuente es <strong>${topTriggers[0][0]}</strong>, presente en ${topTriggers[0][1]} de ${episodes.length} episodios.</div></div>`:""}
      <div class="insight"><div class="insight-icon">📊</div>
        <div class="insight-text">Intensidad promedio: <strong>${avg}/10</strong>. ${+avg>7?"Se recomienda consultar al médico sobre tratamiento preventivo.":"Dentro de un rango manejable."}</div></div>
      ${thisMonth>0?`<div class="insight"><div class="insight-icon">📅</div>
        <div class="insight-text">Este mes llevás <strong>${thisMonth} episodio${thisMonth!==1?"s":""}</strong> registrado${thisMonth!==1?"s":""}.</div></div>`:""}
    </div>
  `;
}

    @media print{
      body{-webkit-print-color-adjust:exact;print-color-adjust:exact;}

  </style></head><body>

      </div>

        <div class="name">Dr. Aldo Emanuel Soriano</div>

</body></html>`);

renderHome();
